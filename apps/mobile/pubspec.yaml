name: clera
description: Clera — ingredient label analyzer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.0
  supabase_flutter: ^2.5.0
  hive_flutter: ^1.1.0
  camera: ^0.11.0
  image: ^4.2.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  in_app_purchase: ^3.2.0
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.0.0
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.0
  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
