<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#0D4A2E"/>

  <!-- Scan frame — top-left bracket -->
