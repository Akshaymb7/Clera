  <!-- Scan frame — top-right bracket -->
  <path d="M724 280 L724 360 M724 280 L644 280" stroke="white" stroke-width="42" stroke-linecap="round" fill="none"/>
  <!-- Scan frame — bottom-left bracket -->
  <path d="M300 744 L300 664 M300 744 L380 744" stroke="white" stroke-width="42" stroke-linecap="round" fill="none"/>
  <!-- Scan frame — bottom-right bracket -->
  <path d="M724 744 L724 664 M724 744 L644 744" stroke="white" stroke-width="42" stroke-linecap="round" fill="none"/>

  <!-- Leaf — centered -->
